name: 每日美股 RS 排行自動更新

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-rs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache.pkl
          key: price-cache-${{ github.run_id }}
          restore-keys: |
            price-cache-

      - name: Run RS calculator
        run: python rs_calculator.py --workers 10

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rs_data.json docs/rs_history.json
          if git diff --staged --quiet; then
            echo "沒有變更，略過 commit"
          else
            git commit -m "chore: 更新 RS 排行 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
